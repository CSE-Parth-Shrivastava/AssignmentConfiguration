spring:
  application:
    name: APIGateway

  cloud:
    discovery:
      enabled: true

    gateway:
      server:
        webflux:
          routes:
            - id: MOVIE
              uri: lb://MOVIE-SERVICE
              predicates:
                - Path=/movies/**

            - id: BOOKING
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/bookings/**

server:
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
